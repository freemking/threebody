<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>三体学习空间</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="particleCanvas"></canvas>
    <div id="sophon-container" class="sophon-container"></div>
    <div id="foil-container" class="foil-container"></div>
    <div id="fleet-container" class="fleet-container"></div>
    <div id="radio-telescope-container" class="radio-telescope-container"></div>
    <div id="three-suns-container" class="three-suns-container"></div>
    <div class="container">
        <header class="header">
            <h1 class="title">三体学习空间</h1>
            <p class="subtitle">探索知识的宇宙，超越维度的限制</p>
            <div class="quotes-container">
                <p class="quote">“不要回答！不要回答！不要回答！”</p>
                <p class="quote">“给岁月以文明，而不是给文明以岁月。”</p>
                <p class="quote">“弱小和无知不是生存的障碍，傲慢才是。”</p>
            </div>
        </header>
        <main class="main-content">
            <div class="card-grid">
                <a href="english/index.html" class="card" target="_blank" data-module="english">
                    <div class="card-icon">
                        <i class="fas fa-language"></i>
                    </div>
                    <h2 class="card-title">英语单词</h2>
                    <p class="card-description">跨越语言维度，解锁星际沟通的密码</p>
                    <div class="card-button">进入飞船</div>
                </a>
                <a href="math/index.html" class="card" target="_blank" data-module="math">
                    <div class="card-icon">
                        <i class="fas fa-divide"></i>
                    </div>
                    <h2 class="card-title">除法口算</h2>
                    <p class="card-description">掌握数学规律，破解宇宙的底层逻辑</p>
                    <div class="card-button">进入飞船</div>
                </a>
                <a href="sudoku/magic-sudoku.html" class="card"  target="_blank"  data-module="sudoku">
                    <div class="card-icon">
                        <i class="fas fa-th"></i>
                    </div>
                    <h2 class="card-title">数独挑战</h2>
                    <p class="card-description">在九宫格中寻找秩序，训练高维思维</p>
                    <div class="card-button">进入飞船</div>
                </a>
            </div>
        </main>
        <footer class="footer">
            <p>© 2026 三体学习空间 - 知识是跨越维度的唯一桥梁</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
