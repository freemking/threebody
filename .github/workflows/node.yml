name: 部署三体学习空间

# 触发条件：main 分支推送或手动触发
on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'README.md'
      - '.gitignore'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      # 1. 配置服务器 SSH 密钥（必备）
      - name: 配置 SSH 免密登录
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SERVER_SSH_KEY }}

      # 2. 核心：通过 SSH 在服务器本机拉取代码并部署
      - name: 服务器本机拉取代码并部署
        run: |
          ssh -o StrictHostKeyChecking=no -o ServerAliveInterval=10 -o ServerAliveCountMax=60 -p 22 www@${{ secrets.SERVER_HOST }} "
          set -e

          # 进入项目目录
          cd /home/www/threebodyspace

          # 拉取最新代码
          git pull origin main

          # 安装后端依赖
          cd server
          npm config set registry https://registry.npmmirror.com/
          npm ci --prefer-offline || npm install

          # 重启 Node.js 服务（使用 sudo 执行 pm2，因为 pm2 安装在 root 用户下）
          pm2 restart threebodyspace-api || pm2 start server.js --name threebodyspace-api

          echo 'Deploy done!'
          "

      # 3. 验证部署
      - name: 验证部署状态
        run: |
          ssh -o StrictHostKeyChecking=no -p 22 www@${{ secrets.SERVER_HOST }} "
            # 检查前端文件
            if [ -f /home/www/threebodyspace/index.html ]; then
              echo '✓ 前端文件存在'
            else
              echo '✗ 前端文件缺失'
              exit 1
            fi
            
            # 检查后端服务
            sudo pm2 status threebodyspace-api || true
          "
          
          echo "=========================================="
          echo "三体学习空间部署完成！"
          echo "前端地址: https://threebody.triway.com.cn"
          echo "API地址: https://threebody.triway.com.cn/api/"
          echo "=========================================="
