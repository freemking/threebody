# Nginx 配置 - 三体学习空间
# 域名: threebody.triway.com.cn
# 使用方式: 将此文件包含到 nginx.conf 的 http 块中，或将内容复制到 sites-available 配置

server {
    listen 80;
    server_name threebody.triway.com.cn;

    # 网站根目录 - 请根据实际部署路径修改
    root /data/www/game/首页;
    index index.html;

    # 编码
    charset utf-8;

    # 访问日志
    access_log /var/log/nginx/threebody.access.log;
    error_log  /var/log/nginx/threebody.error.log;

    # 首页
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 英语游戏子目录
    location /english/ {
        try_files $uri $uri/ /english/index.html;
        
        # 允许跨域访问JSON数据文件
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, OPTIONS";
    }

    # API代理 - 转发到Node.js后端服务
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
    }

    # 静态资源缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # JSON 数据文件
    location ~* \.json$ {
        expires 1h;
        add_header Cache-Control "public";
        add_header Access-Control-Allow-Origin *;
    }

    # 禁止访问隐藏文件
    location ~ /\. {
        deny all;
    }

    # Gzip 压缩
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_min_length 1000;
}
